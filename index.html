<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Generator· Excel to QR </title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bwip-js/dist/bwip-js-min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a3a;
    --accent: #7c5cfc;
    --accent2: #fc5c7d;
    --accent3: #5cf0c4;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --card-bg: #16161f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* --- background grid --- */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,92,252,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,92,252,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
    opacity: .35;
  }
  .glow-1 { background: var(--accent); top: -200px; left: -200px; }
  .glow-2 { background: var(--accent2); bottom: -200px; right: -200px; }

  /* --- layout --- */
  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* --- header --- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 32px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 44px; height: 44px;
    background: var(--accent);
    border-radius: 10px;
    display: grid;
    place-items: center;
    font-size: 22px;
  }

  .logo h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    letter-spacing: -.02em;
  }

  .logo span {
    font-size: .75rem;
    color: var(--muted);
    font-weight: 300;
    display: block;
  }

  .badge {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: .7rem;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: .05em;
    text-transform: uppercase;
  }

  /* --- upload zone --- */
  .upload-section {
    margin-bottom: 40px;
  }

  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: .7rem;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: .15em;
    margin-bottom: 14px;
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: all .25s ease;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .drop-zone::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(124,92,252,.07), rgba(252,92,125,.07));
    opacity: 0;
    transition: opacity .3s;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .drop-zone:hover::after, .drop-zone.drag-over::after { opacity: 1; }

  .drop-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    display: block;
    filter: grayscale(.3);
  }

  .drop-zone h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .drop-zone p {
    color: var(--muted);
    font-size: .8rem;
    margin-bottom: 20px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: .82rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all .2s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 20px rgba(124,92,252,.3);
  }
  .btn-primary:hover { background: #9070ff; transform: translateY(-1px); }

  .btn-ghost {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  .btn-success {
    background: var(--accent3);
    color: #0a0a0f;
    box-shadow: 0 4px 16px rgba(92,240,196,.25);
  }
  .btn-success:hover { filter: brightness(1.1); }

  #fileInput { display: none; }

  /* --- config bar --- */
  .config-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: flex-end;
    margin-bottom: 32px;
    padding: 20px 24px;
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  .config-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .config-group label {
    font-size: .7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
  }

  select, input[type="range"], input[type="color"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 10px;
    font-family: 'DM Mono', monospace;
    font-size: .8rem;
    cursor: pointer;
    transition: border-color .2s;
  }

  select:focus, select:hover { border-color: var(--accent); outline: none; }

  input[type="range"] {
    padding: 0;
    width: 120px;
    accent-color: var(--accent);
  }

  input[type="color"] {
    width: 48px;
    height: 34px;
    padding: 2px;
  }

  .color-pair {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .color-pair span { font-size: .75rem; color: var(--muted); }

  .config-bar .btn { align-self: flex-end; }

  /* --- column selector --- */
  .col-select-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 28px;
  }

  .col-select-panel.visible { display: block; }

  .col-select-panel h4 {
    font-family: 'Syne', sans-serif;
    font-size: .9rem;
    margin-bottom: 14px;
    color: var(--accent);
  }

  .col-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: .75rem;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: all .2s;
    user-select: none;
  }

  .chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 2px 10px rgba(124,92,252,.4);
  }

  .sep-input {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
  }

  .sep-input label { font-size: .75rem; color: var(--muted); }

  .sep-input input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 5px 10px;
    font-family: 'DM Mono', monospace;
    font-size: .8rem;
    width: 80px;
  }

  /* --- stats bar --- */
  .stats {
    display: flex;
    gap: 20px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 110px;
  }

  .stat-val {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    line-height: 1;
  }

  .stat-val.purple { color: var(--accent); }
  .stat-val.pink   { color: var(--accent2); }
  .stat-val.teal   { color: var(--accent3); }

  .stat-label { font-size: .7rem; color: var(--muted); }

  /* --- search --- */
  .search-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
  }

  .search-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 16px;
    font-family: 'DM Mono', monospace;
    font-size: .85rem;
    transition: border-color .2s;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  /* --- grid --- */
  #qrGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
  }

  .qr-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 16px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    transition: all .25s;
    cursor: default;
    animation: fadeUp .4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .qr-card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(124,92,252,.2);
  }

  .qr-canvas-wrap {
    background: #fff;
    border-radius: 8px;
    padding: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 140px;
    height: 140px;
    overflow: hidden;
  }

  .qr-canvas-wrap canvas,
  .qr-canvas-wrap img { max-width: 100%; max-height: 100%; }

  .qr-label {
    width: 100%;
    text-align: center;
  }

  .qr-label .row-num {
    font-size: .65rem;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .qr-label .content {
    font-size: .78rem;
    color: var(--text);
    word-break: break-all;
    line-height: 1.4;
    max-height: 50px;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }

  .qr-card .btn {
    width: 100%;
    justify-content: center;
    font-size: .72rem;
    padding: 7px 10px;
  }

  /* --- empty / loading states --- */
  #emptyState {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  #emptyState .big { font-size: 4rem; display: block; margin-bottom: 16px; }

  #emptyState h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    margin-bottom: 8px;
    color: var(--text);
  }

  /* --- toolbar --- */
  .toolbar {
    display: none;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 24px;
  }
  .toolbar.visible { display: flex; }

  .toolbar-left { display: flex; gap: 10px; flex-wrap: wrap; }

  /* --- toast --- */
  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 30px;
    font-size: .8rem;
    opacity: 0;
    transition: all .3s;
    pointer-events: none;
    z-index: 99;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* --- progress --- */
  #progressWrap {
    display: none;
    margin-bottom: 20px;
    background: var(--surface);
    border-radius: 8px;
    overflow: hidden;
    height: 6px;
  }
  #progressBar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .2s;
    width: 0%;
  }

  /* --- demo template link --- */
  .template-note {
    font-size: .75rem;
    color: var(--muted);
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .template-note a {
    color: var(--accent3);
    cursor: pointer;
    text-decoration: underline;
    text-decoration-style: dotted;
  }
</style>
</head>
<body>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">⬛</div>
      <div>
        <h1>QR Generator</h1>
        <span>Excel → QR Codes · Batch</span>
      </div>
    </div>
    <div class="badge">v1.0</div>
  </header>

  <!-- UPLOAD -->
  <div class="upload-section">
    <div class="section-label">01 · Cargar archivo</div>
    <div class="drop-zone" id="dropZone">
      <span class="drop-icon">📊</span>
      <h3>Arrastra tu archivo Excel aquí</h3>
      <p>Soporta .xlsx · .xls · .csv — máx. 10 MB</p>
      
      <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
      </button>
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
  </div>

  <!-- COLUMN SELECTOR -->
  <div class="col-select-panel" id="colPanel">
    <h4>Selecciona columnas a incluir en el QR</h4>
    <div class="col-chips" id="colChips"></div>
    <div class="sep-input">
      <label>Separador de campos:</label>
      <input type="text" id="sepInput" value=" | " maxlength="10">
      <button class="btn btn-ghost" onclick="regenerateAll()">↻ Aplicar</button>
    </div>
  </div>

  <!-- CONFIG -->
  <div class="config-bar" id="configBar" style="display:none">
    <div class="config-group">
      <label>Corrección de error</label>
      <select id="eccLevel">
        <option value="L">L — 7%</option>
        <option value="M" selected>M — 15%</option>
        <option value="Q">Q — 25%</option>
        <option value="H">H — 30%</option>
      </select>
    </div>
    <div class="config-group">
      <label>Tamaño QR (px)</label>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="range" id="qrSize" min="64" max="512" value="160" step="16">
        <span id="qrSizeVal" style="font-size:.75rem;color:var(--muted);min-width:40px">160px</span>
      </div>
    </div>
    <div class="config-group">
      <label>Color QR / Fondo</label>
      <div class="color-pair">
        <input type="color" id="fgColor" value="#000000" title="Color del QR">
        <span>/</span>
        <input type="color" id="bgColor" value="#ffffff" title="Fondo del QR">
      </div>
    </div>
    <div class="config-group">
      <label>Columna del nombre</label>
      <select id="labelCol"><option value="">— sin nombre —</option></select>
    </div>
    <button class="btn btn-primary" onclick="regenerateAll()">↻ Regenerar</button>
  </div>

  <!-- PROGRESS -->
  <div id="progressWrap"><div id="progressBar"></div></div>

  <!-- STATS -->
  <div class="stats" id="statsBar" style="display:none">
    <div class="stat">
      <div class="stat-val purple" id="statTotal">0</div>
      <div class="stat-label">Total QRs</div>
    </div>
    <div class="stat">
      <div class="stat-val pink" id="statCols">0</div>
      <div class="stat-label">Columnas</div>
    </div>
    <div class="stat">
      <div class="stat-val teal" id="statRows">0</div>
      <div class="stat-label">Filas</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar" id="toolbar">
    <div class="search-bar" style="flex:1;margin:0">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍  Buscar en los QR...">
    </div>
    <div class="toolbar-left">
      <button class="btn btn-ghost" onclick="downloadAllZip()">⬇ Descargar todos (ZIP)</button>
      <button class="btn btn-success" onclick="printAll()">🖨 Imprimir</button>
    </div>
  </div>

  <!-- GRID -->
  <div id="emptyState">
    <span class="big">⬛</span>
    <h3>Listo para generar</h3>
    <p>Carga un archivo Excel con tus datos</p>
  </div>
  <div id="qrGrid"></div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ─── state ───────────────────────────────────────────────
let allRows = [];
let headers = [];
let activeColumns = [];
let qrObjects = [];  // { text, label, idx }

const eccLevel   = () => document.getElementById('eccLevel').value;
const qrSize     = () => parseInt(document.getElementById('qrSize').value);
const fgColor    = () => document.getElementById('fgColor').value;
const bgColor    = () => document.getElementById('bgColor').value;
const separator  = () => document.getElementById('sepInput').value || ' | ';
const labelColEl = () => document.getElementById('labelCol').value;

// ─── drag & drop ────────────────────────────────────────
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

// ─── load file ──────────────────────────────────────────
function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const data = new Uint8Array(e.target.result);
    const wb = XLSX.read(data, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    if (!json.length) return toast('⚠ Archivo vacío');
    processData(json);
  };
  reader.readAsArrayBuffer(file);
  toast('📂 Cargando: ' + file.name);
}

// ─── process data ───────────────────────────────────────
function processData(rows) {
  headers = rows[0].map(String);
  allRows = rows.slice(1).filter(r => r.some(c => c !== '' && c !== null));

  // default: all columns active
  activeColumns = [...headers.keys()];

  buildColPanel();
  buildLabelColSelect();
  showUI();
  generateQRs();
}

function buildColPanel() {
  const panel = document.getElementById('colPanel');
  const chips = document.getElementById('colChips');
  chips.innerHTML = '';
  panel.classList.add('visible');

  headers.forEach((h, i) => {
    const chip = document.createElement('div');
    chip.className = 'chip active';
    chip.textContent = h || `Col ${i+1}`;
    chip.dataset.idx = i;
    chip.addEventListener('click', () => {
      const idx = +chip.dataset.idx;
      if (chip.classList.contains('active')) {
        if (activeColumns.length <= 1) return toast('⚠ Selecciona al menos una columna');
        activeColumns = activeColumns.filter(x => x !== idx);
        chip.classList.remove('active');
      } else {
        activeColumns.push(idx);
        activeColumns.sort((a,b) => a-b);
        chip.classList.add('active');
      }
      regenerateAll();
    });
    chips.appendChild(chip);
  });
}

function buildLabelColSelect() {
  const sel = document.getElementById('labelCol');
  sel.innerHTML = '<option value="">— sin nombre —</option>';
  headers.forEach((h, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = h || `Col ${i+1}`;
    sel.appendChild(opt);
  });
  // auto select first col as label
  if (headers.length) sel.value = '0';
}

function showUI() {
  document.getElementById('configBar').style.display = 'flex';
  document.getElementById('statsBar').style.display  = 'flex';
  document.getElementById('toolbar').classList.add('visible');
  document.getElementById('emptyState').style.display = 'none';
}

// ─── generate QRs ───────────────────────────────────────
function generateQRs() {
  const grid = document.getElementById('qrGrid');
  grid.innerHTML = '';
  qrObjects = [];

  const labelIdx = labelColEl() !== '' ? parseInt(labelColEl()) : null;
  const rows = filterRows();

  document.getElementById('statTotal').textContent = rows.length;
  document.getElementById('statCols').textContent  = activeColumns.length;
  document.getElementById('statRows').textContent  = allRows.length;

  showProgress();

  rows.forEach((row, i) => {
    const parts = activeColumns.map(ci => String(row[ci] ?? '').trim()).filter(Boolean);
    const text = parts.join(separator());
    const label = labelIdx !== null ? String(row[labelIdx] ?? '') : `Fila ${i+1}`;

    qrObjects.push({ text, label, idx: i });

    setTimeout(() => {
      if (!text) return;
      const card = buildCard(text, label, i);
      grid.appendChild(card);
      updateProgress((i+1) / rows.length * 100);
      if (i === rows.length - 1) hideProgress();
    }, i * 8);
  });
}

function buildCard(text, label, idx) {
  const card = document.createElement('div');
  card.className = 'qr-card';
  card.style.animationDelay = (idx * .03) + 's';
  card.dataset.content = (text + ' ' + label).toLowerCase();

  const wrap = document.createElement('div');
  wrap.className = 'qr-canvas-wrap';

  const size = Math.min(qrSize(), 128);

  const canvas = document.createElement('canvas');

  bwipjs.toCanvas(canvas, {
    bcid:        'datamatrix',
    text:        text,
    scale:       4,
    backgroundcolor: bgColor().replace('#',''),
    includetext: false
  });

wrap.appendChild(canvas);

  const labelDiv = document.createElement('div');
  labelDiv.className = 'qr-label';
  labelDiv.innerHTML = `
    <div class="row-num">#${idx+1}</div>
    <div class="content" title="${text}">${label || text}</div>
  `;

  const dlBtn = document.createElement('button');
  dlBtn.className = 'btn btn-ghost';
  dlBtn.textContent = '⬇ Descargar PNG';
  dlBtn.addEventListener('click', () => downloadCard(wrap, label || 'qr_' + idx));

  card.appendChild(wrap);
  card.appendChild(labelDiv);
  card.appendChild(dlBtn);
  return card;
}

// ─── download single ────────────────────────────────────
function downloadCard(wrap, name) {
  const canvas = wrap.querySelector('canvas');
  const img    = wrap.querySelector('img');
  if (canvas) {
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = sanitize(name) + '.png';
    a.click();
  } else if (img) {
    const a = document.createElement('a');
    a.href = img.src;
    a.download = sanitize(name) + '.png';
    a.click();
  }
}

// ─── download all (ZIP real con JSZip) ──────────────────
async function downloadAllZip() {
  const cards = [...document.querySelectorAll('.qr-card')].filter(c => c.style.display !== 'none');
  if (!cards.length) return toast('⚠ No hay QRs para descargar');

  toast('📦 Generando ZIP con ' + cards.length + ' QRs…');
  showProgress();

  const zip = new JSZip();
  const carpeta = zip.folder('codigos-qr');

  for (let i = 0; i < cards.length; i++) {
    const wrap   = cards[i].querySelector('.qr-canvas-wrap');
    const label  = cards[i].querySelector('.content')?.textContent || 'qr_' + i;
    const canvas = wrap.querySelector('canvas');
    const img    = wrap.querySelector('img');

    let base64 = null;
    if (canvas) {
      base64 = canvas.toDataURL('image/png').split(',')[1];
    } else if (img) {
      // convertir img a canvas para obtener base64
      const c = document.createElement('canvas');
      c.width  = img.naturalWidth  || 256;
      c.height = img.naturalHeight || 256;
      c.getContext('2d').drawImage(img, 0, 0);
      base64 = c.toDataURL('image/png').split(',')[1];
    }

    if (base64) {
      const nombre = sanitize(label) + '.png';
      carpeta.file(nombre, base64, { base64: true });
    }

    updateProgress((i + 1) / cards.length * 100);
    await sleep(5);
  }

  const blob = await zip.generateAsync({ type: 'blob' });
  saveAs(blob, 'codigos-qr.zip');
  hideProgress();
  toast('✅ ZIP descargado con ' + cards.length + ' QRs');
}

// ─── print ──────────────────────────────────────────────
function printAll() {
  const cards = [...document.querySelectorAll('.qr-card')].filter(c => c.style.display !== 'none');
  if (!cards.length) return;

  let html = `<html><head><style>
    body{font-family:monospace;background:#fff;margin:0;padding:16px}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    .card{border:1px solid #ddd;border-radius:8px;padding:12px;text-align:center;break-inside:avoid}
    .card img,.card canvas{max-width:100%}
    .label{font-size:11px;margin-top:6px;word-break:break-all}
    @media print{@page{margin:10mm}}
  </style></head><body><div class="grid">`;

  cards.forEach(c => {
    const canvas = c.querySelector('canvas');
    const img    = c.querySelector('img');
    const label  = c.querySelector('.content')?.textContent || '';
    const src    = canvas ? canvas.toDataURL() : (img ? img.src : '');
    html += `<div class="card"><img src="${src}"><div class="label">${label}</div></div>`;
  });

  html += '</div></body></html>';
  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  win.print();
}

// ─── progress helpers ────────────────────────────────────
function showProgress() {
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressBar').style.width = '0%';
}
function updateProgress(pct) {
  document.getElementById('progressBar').style.width = pct + '%';
}
function hideProgress() {
  setTimeout(() => {
    document.getElementById('progressWrap').style.display = 'none';
  }, 400);
}

// ─── QR size label ──────────────────────────────────────
document.getElementById('qrSize').addEventListener('input', e => {
  document.getElementById('qrSizeVal').textContent = e.target.value + 'px';
});

// ─── utils ──────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2800);
}

function sanitize(s) {
  return s.replace(/[^a-z0-9_\-\.]/gi, '_').substring(0, 60);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
